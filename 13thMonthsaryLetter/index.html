<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy 13th Monthsary, Baby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1: #fff0f6;
      --bg2: #ffe4ec;
      --bg3: #fff8fb;
      --primary: #ff5c8a;
      --primary-dark: #e94879;
      --accent: #ff9bb5;
      --gold: #ffd166;
      --text: #5a4350;
      --text-soft: #7a6270;
      --paper: rgba(255,255,255,0.88);
      --shadow: 0 20px 60px rgba(233, 72, 121, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Nunito', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.8), transparent 30%),
        radial-gradient(circle at top right, rgba(255,192,203,0.35), transparent 22%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 55%, var(--bg3));
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .floating-item {
      position: fixed;
      bottom: -10vh;
      pointer-events: none;
      user-select: none;
      opacity: 0;
      z-index: 0;
      animation: floatUp linear forwards;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.08));
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.7) rotate(0deg);
        opacity: 0;
      }
      15% { opacity: 0.75; }
      100% {
        transform: translateY(-120vh) scale(1.25) rotate(18deg);
        opacity: 0;
      }
    }

    .sparkle {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 12px rgba(255,255,255,0.9);
      animation: twinkle 2.8s ease-in-out infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.7); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    #intro-stage,
    #letter-stage {
      position: relative;
      z-index: 2;
    }

    #intro-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .subtitle {
      font-family: 'Quicksand', sans-serif;
      font-size: 0.98rem;
      color: var(--text-soft);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
    }

    .love-card {
      width: min(92vw, 380px);
      aspect-ratio: 1 / 1.05;
      position: relative;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .love-card:hover {
      transform: translateY(-4px) scale(1.02);
    }

    .card-shell {
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background: linear-gradient(160deg, #ff7aa2, #ff5c8a 55%, #ff8fb0);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-shell::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 22px;
    }

    .top-ribbon {
      position: absolute;
      width: 100%;
      height: 46%;
      top: 0;
      left: 0;
      background: linear-gradient(180deg, #ffb1c8, #ff8fb0);
      clip-path: polygon(0 0, 100% 0, 100% 72%, 50% 100%, 0 72%);
      transform-origin: top;
      transition: transform 1s cubic-bezier(.2,.8,.2,1);
      z-index: 3;
    }

    .love-card.open .top-ribbon {
      transform: rotateX(175deg);
    }

    .seal {
      position: absolute;
      top: 33%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(255,255,255,0.96);
      display: grid;
      place-items: center;
      font-size: 2rem;
      box-shadow: 0 12px 28px rgba(0,0,0,0.12);
      z-index: 4;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .love-card.open .seal {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.7);
    }

    .mini-note {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      width: calc(100% - 48px);
      height: 56%;
      background: linear-gradient(180deg, #fffefc, #fff7fa);
      border-radius: 22px;
      z-index: 2;
      box-shadow: inset 0 0 0 1px rgba(255,92,138,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      font-family: 'Great Vibes', cursive;
      color: var(--primary-dark);
      font-size: 2rem;
      line-height: 1.2;
      transition: transform 0.95s cubic-bezier(.2,.8,.2,1) 0.22s;
    }

    .love-card.open .mini-note {
      transform: translateX(-50%) translateY(-115px);
    }

    .tap-note {
      font-weight: 800;
      color: var(--primary-dark);
      font-size: 1rem;
      animation: pulse 1.8s infinite;
      letter-spacing: 0.04em;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.95; }
      50% { transform: scale(1.08); opacity: 1; }
    }

    #letter-stage {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(255,255,255,0.55), rgba(255,240,246,0.9));
      backdrop-filter: blur(8px);
      overflow: auto;
    }

    .letter-wrap {
      width: min(100%, 860px);
      min-height: min(90vh, 900px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      animation: riseIn 0.8s ease;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .letter-paper {
      position: relative;
      background: var(--paper);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 32px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .letter-paper::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(transparent 31px, rgba(255,182,193,0.13) 32px),
        linear-gradient(90deg, rgba(255,122,162,0.08), rgba(255,122,162,0.02));
      background-size: 100% 32px, 100% 100%;
      pointer-events: none;
    }

    .letter-inner {
      position: relative;
      z-index: 1;
      padding: 28px 24px 24px;
      max-height: 88vh;
      overflow-y: auto;
    }

    .letter-inner::-webkit-scrollbar {
      width: 8px;
    }

    .letter-inner::-webkit-scrollbar-thumb {
      background: rgba(255,92,138,0.35);
      border-radius: 999px;
    }

    .top-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.85);
      color: var(--primary-dark);
      border: 1px solid rgba(255,92,138,0.18);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 800;
      margin-bottom: 14px;
      box-shadow: 0 8px 18px rgba(255,92,138,0.08);
    }

    .title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.3rem, 5vw, 4rem);
      color: var(--primary-dark);
      text-align: center;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .title-sub {
      text-align: center;
      color: var(--text-soft);
      font-size: 1rem;
      margin-bottom: 22px;
      font-weight: 700;
    }

    .hero-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .photo-panel {
      position: relative;
      width: 100%;
      min-height: 260px;
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(135deg, #ffd9e6, #fff6fa);
      border: 2px solid rgba(255,255,255,0.7);
      box-shadow: 0 15px 35px rgba(255,92,138,0.12);
      display: grid;
      place-items: center;
    }

    .photo-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-placeholder {
      padding: 24px;
      text-align: center;
      color: var(--text-soft);
      line-height: 1.7;
      font-weight: 700;
    }

    .photo-placeholder span {
      display: block;
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    .message-box {
      background: rgba(255,255,255,0.68);
      border: 1px solid rgba(255,92,138,0.1);
      border-radius: 24px;
      padding: 22px 18px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4);
    }

    .typewriter-text {
      font-family: 'Quicksand', sans-serif;
      font-size: clamp(1rem, 2vw, 1.12rem);
      line-height: 2;
      color: var(--text);
      white-space: pre-wrap;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--primary-dark);
      margin-left: 2px;
      vertical-align: -2px;
      animation: blink 1s steps(1) infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }

    .signature {
      margin-top: 20px;
      text-align: right;
      color: var(--primary-dark);
      font-family: 'Great Vibes', cursive;
      font-size: 2.1rem;
      opacity: 0;
      transform: translateY(10px);
      transition: 0.6s ease;
    }

    .signature.show {
      opacity: 1;
      transform: translateY(0);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 22px;
      opacity: 0;
      transform: translateY(10px);
      transition: 0.6s ease;
    }

    .controls.show {
      opacity: 1;
      transform: translateY(0);
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 13px 20px;
      font-weight: 800;
      font-size: 0.98rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: 0 10px 20px rgba(233,72,121,0.16);
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.03);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.92);
      color: var(--primary-dark);
      border: 1px solid rgba(255,92,138,0.18);
    }

    .btn-gold {
      background: linear-gradient(135deg, #ffe29a, var(--gold));
      color: #7a4b00;
    }

    .corner-note {
      margin-top: 16px;
      text-align: center;
      color: var(--text-soft);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .kiss {
      position: fixed;
      left: 50%;
      top: 58%;
      transform: translate(-50%, -50%);
      font-size: 2rem;
      pointer-events: none;
      z-index: 9999;
      animation: kissBurst 1.25s ease forwards;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.16));
    }

    @keyframes kissBurst {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
      15% { opacity: 1; }
      100% { opacity: 0; transform: translate(var(--x), var(--y)) scale(1.8) rotate(var(--r)); }
    }

    .love-pop {
      position: fixed;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--primary-dark);
      pointer-events: none;
      z-index: 9999;
      animation: floatText 1.8s ease forwards;
      text-shadow: 0 4px 10px rgba(255,255,255,0.65);
    }

    @keyframes floatText {
      0% { opacity: 0; transform: translateY(0) scale(0.9); }
      20% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-90px) scale(1.15); }
    }

    @media (min-width: 760px) {
      .letter-inner {
        padding: 34px 34px 28px;
      }

      .hero-row {
        grid-template-columns: 280px 1fr;
        align-items: start;
      }

      .photo-panel {
        min-height: 360px;
      }
    }

    @media (max-width: 480px) {
      .mini-note {
        font-size: 1.75rem;
      }

      .message-box {
        padding: 18px 14px;
      }

      .typewriter-text {
        line-height: 1.85;
      }
    }
  </style>
</head>
<body>
  <div id="decor-layer"></div>

  <section id="intro-stage">
    <p class="subtitle">A little surprise for Baby</p>

    <div class="love-card" id="loveCard" onclick="openLetter()" aria-label="Open the monthsary letter" role="button" tabindex="0">
      <div class="card-shell"></div>
      <div class="top-ribbon"></div>
      <div class="mini-note">For My Baby ♡</div>
      <div class="seal">💌</div>
    </div>

    <p class="tap-note">Tap to open your 13th monthsary letter</p>
  </section>

  <section id="letter-stage">
    <div class="letter-wrap">
      <article class="letter-paper">
        <div class="letter-inner" id="paperScroll">
          <div class="top-badge">💗 13 Months Together</div>
          <h1 class="title">Happy 13th Monthsary, Baby</h1>
          <p class="title-sub">A little love letter for the one who makes everything feel softer and brighter.</p>

          <div class="hero-row">
            <div class="photo-panel">
              <!-- Your photo inserted -->
              <img src="https://raw.githubusercontent.com/senaganlex/senaganlex.github.io/main/13thMonthsaryLetter/assets/Messenger_creation_EEABEC34-0F34-4146-95E7-0B8C06834CE8.jpeg" alt="Our Photo">
            </div>

            <div class="message-box">
              <div id="typewriter" class="typewriter-text"></div>
              <div id="signature" class="signature">Always yours, Baby ♡</div>
            </div>
          </div>

          <div class="controls" id="controls">
            <button class="btn btn-primary" onclick="celebrate()">Celebrate 🎉</button>
            <button class="btn btn-secondary" onclick="sendKiss()">Send Kiss 💋</button>
            <button class="btn btn-gold" onclick="dropLoveNote()">More Love ✨</button>
          </div>

          <p class="corner-note">13 months down, and still choosing you every single day.</p>
        </div>
      </article>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    const message = `Baby,

Thirteen months with you feels like something I still cannot fully measure. It feels long enough to hold so many beautiful memories, but at the same time, it still feels too short for all the love I want to give you and all the moments I still want to share with you.

Every day with you has become something so special to me. I am grateful for your love, your laughter, your softness, your patience, and even the smallest little moments we share that somehow stay in my heart the longest. Being with you makes ordinary days feel warm, meaningful, and unforgettable.

Thank you for staying. Thank you for understanding me, for choosing me, and for loving me the way you do. You make me feel seen, comforted, and deeply loved in ways I never expected. You make my life brighter, my heart fuller, and my world so much more beautiful just by being in it.

No matter how much time passes, I know I will keep cherishing you, loving you, and appreciating everything about you. These thirteen months are already so precious to me, and I still look forward to all the months, memories, laughter, and love that are still waiting for us.

Here’s to more late nights, more sweet moments, more memories, and more love together, Baby. I love you always. 💕🫰🏼🥰☺️😚`;

    const introStage = document.getElementById('intro-stage');
    const letterStage = document.getElementById('letter-stage');
    const loveCard = document.getElementById('loveCard');
    const typewriter = document.getElementById('typewriter');
    const controls = document.getElementById('controls');
    const signature = document.getElementById('signature');
    const paperScroll = document.getElementById('paperScroll');
    const decorLayer = document.getElementById('decor-layer');

    function createSparkles() {
      for (let i = 0; i < 20; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.top = Math.random() * 100 + 'vh';
        s.style.animationDelay = Math.random() * 2.5 + 's';
        s.style.animationDuration = 1.8 + Math.random() * 2 + 's';
        decorLayer.appendChild(s);
      }
    }

    function spawnFloatingDecor() {
      const item = document.createElement('div');
      item.className = 'floating-item';
      item.textContent = Math.random() > 0.3 ? '💖' : (Math.random() > 0.5 ? '✨' : '🌸');
      item.style.left = Math.random() * 100 + 'vw';
      item.style.fontSize = 12 + Math.random() * 24 + 'px';
      item.style.animationDuration = 5 + Math.random() * 4 + 's';
      decorLayer.appendChild(item);

      setTimeout(() => item.remove(), 9500);
    }

    createSparkles();
    setInterval(spawnFloatingDecor, 320);

    function openLetter() {
      if (loveCard.classList.contains('open')) return;
      loveCard.classList.add('open');

      setTimeout(() => {
        introStage.style.opacity = '0';
        introStage.style.transform = 'translateY(-16px) scale(0.98)';
      }, 650);

      setTimeout(() => {
        introStage.style.display = 'none';
        letterStage.style.display = 'flex';
        startTyping();
        celebrate();
      }, 1200);
    }

    loveCard.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openLetter();
      }
    });

    function startTyping() {
      let i = 0;
      const speed = 22;

      function type() {
        if (i < message.length) {
          typewriter.textContent += message.charAt(i);
          i++;
          paperScroll.scrollTop = paperScroll.scrollHeight;
          setTimeout(type, speed);
        } else {
          const cursor = document.createElement('span');
          cursor.className = 'cursor';
          typewriter.appendChild(cursor);
          signature.classList.add('show');
          controls.classList.add('show');
        }
      }

      type();
    }

    function celebrate() {
      const end = Date.now() + 2200;
      const interval = setInterval(() => {
        if (Date.now() > end) {
          clearInterval(interval);
          return;
        }

        confetti({
          particleCount: 35,
          startVelocity: 28,
          spread: 70,
          ticks: 120,
          scalar: 1,
          origin: { x: Math.random() * 0.3 + 0.1, y: Math.random() * 0.25 + 0.05 }
        });

        confetti({
          particleCount: 35,
          startVelocity: 28,
          spread: 70,
          ticks: 120,
          scalar: 1,
          origin: { x: Math.random() * 0.3 + 0.6, y: Math.random() * 0.25 + 0.05 }
        });
      }, 220);
    }

    function sendKiss() {
      for (let i = 0; i < 18; i++) {
        const kiss = document.createElement('div');
        kiss.className = 'kiss';
        kiss.textContent = i % 3 === 0 ? '😘' : '💋';
        kiss.style.setProperty('--x', `${(Math.random() - 0.5) * window.innerWidth}px`);
        kiss.style.setProperty('--y', `${(Math.random() - 0.5) * window.innerHeight}px`);
        kiss.style.setProperty('--r', `${(Math.random() - 0.5) * 80}deg`);
        document.body.appendChild(kiss);
        setTimeout(() => kiss.remove(), 1400);
      }
    }

    function dropLoveNote() {
      const messages = [
        'I love you, Baby 💕',
        'You make my heart full 🫶',
        'More memories with you ✨',
        'Forever my Baby 💖',
        'Still choosing you 💗'
      ];

      for (let i = 0; i < 8; i++) {
        const note = document.createElement('div');
        note.className = 'love-pop';
        note.textContent = messages[Math.floor(Math.random() * messages.length)];
        note.style.left = 10 + Math.random() * 75 + 'vw';
        note.style.top = 62 + Math.random() * 18 + 'vh';
        document.body.appendChild(note);
        setTimeout(() => note.remove(), 1900);
      }
    }
  </script>
</body>
</html>
