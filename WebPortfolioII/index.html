<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LMS — PORTFOLIO</title>
<link rel="icon" type="image/jpeg" href="https://senaganlex.github.io/WebPortfolioII/assets/image/tabicon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
/* ── RESET & ROOT ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b10;
  --bg1:#0d1117;
  --bg2:#111620;
  --bg3:#161c28;
  --glass:rgba(255,255,255,0.03);
  --glass-border:rgba(255,255,255,0.06);
  --glass-hover:rgba(255,255,255,0.06);
  --accent:#4f9cff;
  --accent2:#7ec8e3;
  --accent-dim:rgba(79,156,255,0.10);
  --accent-glow:rgba(79,156,255,0.20);
  --gold:#d4a853;
  --gold-dim:rgba(212,168,83,0.10);
  --text:#e8edf5;
  --text2:#8a94a8;
  --text3:#50596b;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --r:14px;
  --r2:20px;
  --r3:28px;
  --ease:cubic-bezier(0.25,0.46,0.45,0.94);
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
}
html{scroll-behavior:smooth;scroll-padding-top:80px}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  line-height:1.6;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  scrollbar-width:thin;
  scrollbar-color:var(--bg3) transparent;
}
body::-webkit-scrollbar{width:6px}
body::-webkit-scrollbar-track{background:transparent}
body::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* ── NOISE OVERLAY ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  opacity:0.35;
  pointer-events:none;
  z-index:0;
}

/* ── AMBIENT ORBS ── */
.orb{
  position:fixed;
  border-radius:50%;
  filter:blur(130px);
  pointer-events:none;
  z-index:0;
  animation:orbFloat 20s ease-in-out infinite;
}
.orb1{
  width:650px;height:650px;
  top:-250px;right:-200px;
  background:radial-gradient(circle,rgba(79,156,255,0.05) 0%,transparent 70%);
}
.orb2{
  width:550px;height:550px;
  bottom:-150px;left:-150px;
  background:radial-gradient(circle,rgba(126,200,227,0.04) 0%,transparent 70%);
  animation-delay:-10s;
}
.orb3{
  width:450px;height:450px;
  top:45%;left:45%;
  background:radial-gradient(circle,rgba(212,168,83,0.03) 0%,transparent 70%);
  animation-delay:-5s;
}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(40px,-25px) scale(1.05)}
  66%{transform:translate(-25px,20px) scale(0.95)}
}

/* ── HEADER ── */
header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:0 clamp(1rem,4vw,3rem);
  background:rgba(8,11,16,0.75);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border-bottom:1px solid var(--glass-border);
  height:68px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  display:flex;align-items:center;gap:12px;
  text-decoration:none;
}
.logo-mark{
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);
  font-size:15px;
  color:#fff;
  letter-spacing:0.5px;
  flex-shrink:0;
  box-shadow:0 0 24px var(--accent-glow);
  transition:box-shadow 0.3s var(--ease);
}
.logo:hover .logo-mark{box-shadow:0 0 36px rgba(79,156,255,0.35)}
.logo-text{
  font-family:var(--serif);
  font-size:17px;
  color:var(--text);
  line-height:1.2;
}
.logo-sub{
  font-family:var(--sans);
  font-size:10.5px;
  color:var(--text3);
  font-weight:300;
  letter-spacing:0.1em;
  text-transform:uppercase;
  display:block;
}
nav{
  display:flex;gap:4px;
}
.nav-btn{
  position:relative;
  padding:8px 16px;
  font-family:var(--sans);
  font-size:13.5px;
  font-weight:400;
  color:var(--text2);
  background:transparent;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:all 0.25s var(--ease);
  letter-spacing:0.01em;
  white-space:nowrap;
}
.nav-btn:hover{
  color:var(--text);
  background:var(--glass);
}
.nav-btn.active{
  color:var(--accent);
  background:var(--accent-dim);
}
.nav-btn.active::after{
  content:'';
  position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:20px;height:2px;
  background:var(--accent);
  border-radius:2px;
}

/* ── HAMBURGER ── */
.menu-toggle{
  display:none;
  flex-direction:column;gap:5px;
  width:32px;height:32px;
  align-items:center;justify-content:center;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:8px;
  cursor:pointer;
  padding:6px;
}
.menu-toggle span{
  display:block;width:18px;height:1.5px;
  background:var(--text2);
  border-radius:2px;
  transition:all 0.3s var(--ease);
}
.menu-toggle.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
.menu-toggle.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.menu-toggle.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
nav.mobile-open{
  display:flex!important;
  flex-direction:column;
  position:fixed;top:68px;left:0;right:0;
  background:rgba(8,11,16,0.97);
  backdrop-filter:blur(28px);
  padding:1rem;
  border-bottom:1px solid var(--glass-border);
  gap:4px;
  z-index:99;
}

@media(max-width:640px){
  nav{display:none}
  .menu-toggle{display:flex}
}

/* ── MAIN ── */
main{
  position:relative;z-index:1;
  padding-top:68px;
  min-height:100vh;
}
.section-wrap{
  max-width:1100px;
  margin:0 auto;
  padding:clamp(2rem,5vw,5rem) clamp(1rem,4vw,3rem);
  animation:pageIn 0.5s var(--ease) both;
}
@keyframes pageIn{
  from{opacity:0;transform:translateY(28px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── LOADING ── */
.loader{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:60vh;gap:16px;
}
.spinner{
  width:34px;height:34px;
  border:2px solid var(--bg3);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════════
   WELCOME SECTION
══════════════════════════ */
.welcome{
  min-height:calc(100vh - 68px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
  padding:clamp(2rem,5vw,5rem) clamp(1rem,4vw,3rem);
  position:relative;
}
.welcome-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-size:11.5px;
  font-weight:500;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--accent);
  padding:6px 14px;
  background:var(--accent-dim);
  border:1px solid rgba(79,156,255,0.18);
  border-radius:100px;
  margin-bottom:2rem;
  animation:pageIn 0.6s var(--ease) 0.1s both;
}
.welcome-eyebrow i{font-size:9px}
.welcome-name{
  font-family:var(--serif);
  font-size:clamp(3.2rem,8vw,7.2rem);
  font-weight:400;
  line-height:1.0;
  color:var(--text);
  letter-spacing:-0.02em;
  margin-bottom:1.5rem;
  animation:pageIn 0.6s var(--ease) 0.2s both;
}
.welcome-name em{
  font-style:italic;
  color:var(--accent);
  display:block;
}
.welcome-tagline{
  font-size:clamp(1rem,2.5vw,1.3rem);
  color:var(--text2);
  font-weight:300;
  max-width:560px;
  line-height:1.7;
  margin:0 auto 3rem;
  animation:pageIn 0.6s var(--ease) 0.3s both;
}
.welcome-pills{
  display:flex;flex-wrap:wrap;gap:10px;justify-content:center;
  margin-bottom:3rem;
  animation:pageIn 0.6s var(--ease) 0.4s both;
}
.pill{
  display:flex;align-items:center;gap:7px;
  padding:8px 16px;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:100px;
  font-size:13px;
  color:var(--text2);
  transition:all 0.3s var(--ease);
}
.pill:hover{
  color:var(--text);
  background:var(--glass-hover);
  border-color:rgba(255,255,255,0.12);
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
}
.pill i{color:var(--accent);font-size:12px}
.welcome-cta{
  display:flex;flex-wrap:wrap;gap:12px;justify-content:center;
  animation:pageIn 0.6s var(--ease) 0.5s both;
}
.btn-primary{
  display:inline-flex;align-items:center;gap:9px;
  padding:14px 30px;
  background:var(--accent);
  color:#fff;
  font-family:var(--sans);
  font-size:14px;
  font-weight:500;
  border:none;
  border-radius:var(--r);
  cursor:pointer;
  transition:all 0.3s var(--ease);
  letter-spacing:0.01em;
  box-shadow:0 0 32px rgba(79,156,255,0.25);
}
.btn-primary:hover{
  background:#6aaeff;
  transform:translateY(-3px);
  box-shadow:0 6px 36px rgba(79,156,255,0.4);
}
.btn-secondary{
  display:inline-flex;align-items:center;gap:9px;
  padding:14px 30px;
  background:var(--glass);
  color:var(--text);
  font-family:var(--sans);
  font-size:14px;
  font-weight:500;
  border:1px solid var(--glass-border);
  border-radius:var(--r);
  cursor:pointer;
  transition:all 0.3s var(--ease);
}
.btn-secondary:hover{
  background:var(--glass-hover);
  border-color:rgba(255,255,255,0.12);
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
}
.welcome-scroll{
  position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:var(--text3);
  font-size:11px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  animation:fadeUp 1s var(--ease) 1s both;
}
.scroll-line{
  width:1px;height:44px;
  background:linear-gradient(to bottom,var(--text3),transparent);
  animation:scrollPulse 2s ease-in-out infinite;
}
@keyframes scrollPulse{
  0%,100%{opacity:0.4;transform:scaleY(1)}
  50%{opacity:1;transform:scaleY(1.1)}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateX(-50%) translateY(12px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}
}

/* ══════════════════════════
   SECTION HEADERS
══════════════════════════ */
.page-header{
  margin-bottom:clamp(2rem,4vw,3.5rem);
  border-bottom:1px solid var(--glass-border);
  padding-bottom:1.5rem;
}
.page-header-meta{
  font-size:11px;
  font-weight:500;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--accent);
  margin-bottom:0.6rem;
}
.page-title{
  font-family:var(--serif);
  font-size:clamp(2.4rem,5vw,3.6rem);
  font-weight:400;
  color:var(--text);
  line-height:1.1;
  letter-spacing:-0.02em;
}
.page-title span{
  font-style:italic;
  color:var(--text2);
}

/* ══════════════════════════
   GLASS CARD
══════════════════════════ */
.card{
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--r2);
  padding:clamp(1.25rem,3vw,2rem);
  transition:all 0.35s var(--ease);
  position:relative;
  overflow:hidden;
}
.card::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.025) 0%,transparent 60%);
  pointer-events:none;
  border-radius:inherit;
}
.card:hover{
  background:var(--glass-hover);
  border-color:rgba(255,255,255,0.10);
  transform:translateY(-5px);
  box-shadow:0 24px 64px rgba(0,0,0,0.45),0 0 0 1px rgba(79,156,255,0.08);
}
.card-accent{border-color:rgba(79,156,255,0.18)}
.card-gold{border-color:rgba(212,168,83,0.18)}

/* ══════════════════════════
   ABOUT SECTION
══════════════════════════ */
.about-grid{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:clamp(1.5rem,3vw,3rem);
  align-items:start;
}
@media(max-width:768px){.about-grid{grid-template-columns:1fr}}
.profile-frame{
  position:relative;
  border-radius:var(--r3);
  overflow:hidden;
  background:var(--bg2);
  border:1px solid var(--glass-border);
  aspect-ratio:3/4;
  box-shadow:0 16px 48px rgba(0,0,0,0.4);
}
.profile-frame img{
  width:100%;height:100%;
  object-fit:cover;
  transition:transform 0.6s var(--ease);
}
.profile-frame:hover img{transform:scale(1.05)}
.profile-badge{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;
  background:rgba(8,11,16,0.85);
  backdrop-filter:blur(14px);
  border:1px solid var(--glass-border);
  border-radius:100px;
  font-size:12px;
  white-space:nowrap;
}
.badge-dot{
  width:7px;height:7px;
  background:#4ade80;
  border-radius:50%;
  box-shadow:0 0 10px rgba(74,222,128,0.6);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.65;transform:scale(1.2)}
}
.about-content{display:flex;flex-direction:column;gap:1.5rem}
.about-intro{
  font-family:var(--serif);
  font-size:clamp(1.3rem,2.5vw,1.7rem);
  font-weight:400;
  line-height:1.5;
  color:var(--text);
  letter-spacing:-0.01em;
}
.about-intro em{font-style:italic;color:var(--accent)}
.about-body{
  font-size:15px;
  color:var(--text2);
  line-height:1.85;
  font-weight:300;
}
.connect-label{
  font-size:11px;
  font-weight:500;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--text3);
  margin-bottom:0.75rem;
}
.social-row{
  display:flex;flex-wrap:wrap;gap:10px;
}
.social-link{
  display:flex;align-items:center;gap:9px;
  padding:10px 18px;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--r);
  font-size:13px;
  color:var(--text2);
  text-decoration:none;
  transition:all 0.3s var(--ease);
}
.social-link:hover{
  color:var(--text);
  background:var(--glass-hover);
  border-color:rgba(255,255,255,0.12);
  transform:translateY(-3px);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
}
.social-link i{font-size:15px}

/* ══════════════════════════
   RESUME SECTION
══════════════════════════ */
.resume-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:clamp(1rem,2vw,1.5rem);
}
@media(max-width:700px){.resume-grid{grid-template-columns:1fr}}
.resume-full{grid-column:1/-1}
.section-heading{
  font-family:var(--serif);
  font-size:1.2rem;
  font-weight:400;
  color:var(--text);
  margin-bottom:1.25rem;
  display:flex;align-items:center;gap:10px;
}
.section-heading i{
  color:var(--accent);
  font-size:14px;
  width:30px;height:30px;
  background:var(--accent-dim);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 12px rgba(79,156,255,0.15);
}
.edu-item{
  padding:1rem;
  background:rgba(255,255,255,0.015);
  border:1px solid var(--glass-border);
  border-radius:var(--r);
  margin-bottom:10px;
  transition:all 0.3s var(--ease);
}
.edu-item:last-child{margin-bottom:0}
.edu-item:hover{background:var(--glass-hover);border-color:rgba(255,255,255,0.10)}
.edu-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px}
.edu-detail{font-size:13px;color:var(--text2)}
.edu-meta{font-size:11.5px;color:var(--text3);margin-top:4px;display:flex;align-items:center;gap:5px}
.skills-group{margin-bottom:1.25rem}
.skills-group:last-child{margin-bottom:0}
.skill-group-label{
  font-size:11px;
  font-weight:500;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--text3);
  margin-bottom:10px;
}
.skill-tags{display:flex;flex-wrap:wrap;gap:7px}
.skill-tag{
  padding:6px 13px;
  font-size:12.5px;
  font-weight:400;
  border-radius:6px;
  transition:all 0.25s var(--ease);
  cursor:default;
}
.skill-tag:hover{transform:translateY(-2px);filter:brightness(1.25)}
.tag-blue{background:rgba(79,156,255,0.10);color:#7ec4ff;border:1px solid rgba(79,156,255,0.18)}
.tag-green{background:rgba(74,222,128,0.08);color:#6edb9c;border:1px solid rgba(74,222,128,0.18)}
.tag-purple{background:rgba(167,139,250,0.08);color:#c4b5fd;border:1px solid rgba(167,139,250,0.18)}
.tag-amber{background:rgba(212,168,83,0.08);color:#e2b966;border:1px solid rgba(212,168,83,0.18)}
.exp-card{padding:1.5rem}
.exp-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  flex-wrap:wrap;gap:12px;
  margin-bottom:1rem;
}
.exp-company{
  font-family:var(--serif);
  font-size:1.2rem;
  color:var(--text);
  margin-bottom:4px;
}
.exp-location{font-size:12px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:5px}
.exp-period{
  display:inline-flex;align-items:center;gap:7px;
  padding:6px 14px;
  background:var(--accent-dim);
  border:1px solid rgba(79,156,255,0.18);
  border-radius:100px;
  font-size:12px;
  color:var(--accent);
  white-space:nowrap;
  font-family:var(--mono);
}
.exp-duties{list-style:none;display:flex;flex-direction:column;gap:9px}
.exp-duties li{
  display:flex;align-items:flex-start;gap:10px;
  font-size:13.5px;
  color:var(--text2);
  line-height:1.55;
}
.exp-duties li::before{
  content:'';
  display:block;width:5px;height:5px;min-width:5px;
  border-radius:50%;
  background:var(--accent);
  margin-top:6px;
  opacity:0.7;
}

/* ══════════════════════════
   PROJECTS SECTION
══════════════════════════ */
.projects-intro{
  font-size:15px;
  color:var(--text2);
  line-height:1.85;
  font-weight:300;
  max-width:680px;
  margin-bottom:2.5rem;
}
.proj-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px;
  margin-bottom:clamp(2.5rem,5vw,4rem);
}
.proj-card{
  display:block;
  text-decoration:none;
  padding:1.5rem;
  background:var(--glass);
  border:1px solid var(--glass-border);

.img-item{

}

/* ══════════════════════════

══════════════════════════ */
.lightbox{

}

.lb-inner{

/* ── HELPERS ── */
function mkImgs(arr, groupId){
  return arr.map((img,i)=>`
    <div class="img-item" data-group="${groupId}" data-idx="${i}">
      <img src="${img.src}" alt="${img.alt}" loading="lazy"
           onerror="this.src='https://placehold.co/600x400/111620/4f9cff?text=${encodeURIComponent(img.alt)}'">
      <div class="img-overlay"><div class="overlay-icon"><i class="fas fa-expand"></i></div></div>
    </div>
  `).join('');
}

function mondayHTML(){
  const groups = [
    {name:'Time Tracker',icon:'clock',prefix:'timetracker',count:30},
    {name:'Fuel Tracker',icon:'gas-pump',prefix:'fueltrack+',count:12},
    {name:'Order Traceability',icon:'clipboard-list',prefix:'ordertraceability',count:3},
    {name:'Material Sourcing',icon:'boxes',prefix:'materialsourcing',count:5},
    {name:'Employee Evaluation',icon:'users',prefix:'employeeevaluation',count:9},
    {name:'Fund Tracker',icon:'chart-line',prefix:'fundtracker',count:11}
  ];
  let html='';
  groups.forEach(g=>{
    const imgs = [];
    for(let i=1;i<=g.count;i++){
      imgs.push({
        src:`https://senaganlex.github.io/WebPortfolioII/assets/image/${g.prefix}${i}.png`,
        alt:`${g.name} screenshot ${i}`
      });
    }
    html+=`
    <div class="gallery-section" style="margin-bottom:2rem">
      <h4 style="font-size:1rem;font-weight:500;color:var(--text);margin-bottom:0.3rem;display:flex;align-items:center;gap:8px">
        <i class="fas fa-${g.icon}" style="color:var(--text3);font-size:13px"></i>${g.name}
        <span style="font-family:var(--mono);font-size:11px;color:var(--text3);font-weight:400">${g.count} screenshots</span>
      </h4>
      <div class="gallery-divider" style="margin:0.5rem 0 1rem"></div>
      <div class="img-grid ig-5" id="mon-${g.prefix}-gallery">
        ${mkImgs(imgs,'mon-'+g.prefix)}
      </div>
    </div>
    `;
  });
  return html;
}

/* ── NAV & ROUTING ── */
function loadSection(name){
  curSection = name;
  const main = document.getElementById('main');

  // Show loader
  main.innerHTML = `<div class="loader"><div class="spinner"></div><span style="font-size:13px;color:var(--text3)">Loading…</span></div>`;

  // Update nav
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.s === name);
  });

  setTimeout(()=>{
    main.innerHTML = sections[name] || `<div class="section-wrap"><p style="color:var(--text2)">Section not found.</p></div>`;

    // Init lightbox for gallery
    if(name==='projects') initGallery();

    // Scroll to top of main
    main.scrollIntoView({behavior:'smooth',block:'start'});

    // Re-bind inline buttons
    main.querySelectorAll('[onclick]').forEach(el=>{
      // onclick attrs already set, no rebind needed
    });
  }, 200);
}

/* ── GALLERY / LIGHTBOX ── */
function initGallery(){
  // Collect all image groups
  const allItems = document.querySelectorAll('.img-item');
  allItems.forEach(item=>{
    item.addEventListener('click', ()=>{
      // Build image list for this group
      const group = item.dataset.group;
      const idx = parseInt(item.dataset.idx);
      const groupItems = [...document.querySelectorAll(`.img-item[data-group="${group}"]`)];
      lbImages = groupItems.map(it=>({
        src: it.querySelector('img').src,
        alt: it.querySelector('img').alt
      }));
      lbIndex = idx;
      openLightbox();
    });
  });
}

function openLightbox(){
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lb-img');
  const cap = document.getElementById('lb-caption');
  const ctr = document.getElementById('lb-counter');
  img.src = lbImages[lbIndex].src;
  cap.textContent = lbImages[lbIndex].alt;
  ctr.textContent = `${lbIndex+1} / ${lbImages.length}`;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function navLightbox(dir){
  const img = document.getElementById('lb-img');
  img.style.opacity = '0';
  setTimeout(()=>{
    lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;
    img.src = lbImages[lbIndex].src;
    document.getElementById('lb-caption').textContent = lbImages[lbIndex].alt;
    document.getElementById('lb-counter').textContent = `${lbIndex+1} / ${lbImages.length}`;
    img.style.opacity = '1';
  }, 150);
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', ()=> navLightbox(-1));
document.getElementById('lb-next').addEventListener('click', ()=> navLightbox(1));
document.getElementById('lightbox').addEventListener('click', e=>{
  if(e.target.id==='lightbox') closeLightbox();
});
document.addEventListener('keydown', e=>{
  if(!document.getElementById('lightbox').classList.contains('open')) return;
  if(e.key==='Escape') closeLightbox();
  if(e.key==='ArrowLeft') navLightbox(-1);
  if(e.key==='ArrowRight') navLightbox(1);
});

/* ── NAV CLICK ── */
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click', ()=> loadSection(btn.dataset.s));
});

/* ── HAMBURGER ── */
const menuToggle = document.getElementById('menu-toggle');
const mainNav = document.getElementById('main-nav');
menuToggle.addEventListener('click', ()=>{
  const open = mainNav.classList.toggle('mobile-open');
  menuToggle.classList.toggle('open', open);
  if(open){
    mainNav.querySelectorAll('.nav-btn').forEach(b=>{
      b.addEventListener('click', ()=>{
        mainNav.classList.remove('mobile-open');
        menuToggle.classList.remove('open');
      },{once:true});
    });
  }
});

/* ── BACK TO TOP ── */
const backTop = document.getElementById('back-top');
window.addEventListener('scroll', ()=>{
  backTop.classList.toggle('visible', window.scrollY > 400);
});
backTop.addEventListener('click', ()=> window.scrollTo({top:0,behavior:'smooth'}));

loadSection('welcome');
